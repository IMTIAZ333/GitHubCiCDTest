name: Deploy .NET 9 App to Local IIS

on:
  push:
    branches:
      - main  # Triggers the deployment every time you push to the main branch

jobs:
  deploy:
    runs-on: self-hosted  # Runs directly on your Windows Server runner

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.313'

    - name: Publish Application
      # Compiles the app into a temporary local folder named 'publish'
      run: dotnet publish --configuration Release --output .\publish

    - name: Stop IIS App Pool (Prevents locked file errors)
      # 🟢 Stops your exact Application Pool: githubPool
      run: |
        powershell -Command "Stop-IISAppPool -Name 'githubPool' -Confirm:$false"
      continue-on-error: true

    - name: Copy Files to IIS Website Folder
      # 🟢 Copies the compiled code straight into your E:\ drive directory
      run: |
        powershell -Command "Copy-Item -Path '.\publish\*' -Destination 'E:\Sites\MyWebSite' -Recurse -Force"

    - name: Start IIS App Pool
      # 🟢 Restarts your exact Application Pool: githubPool
      run: |
        powershell -Command "Start-IISAppPool -Name 'githubPool'"
